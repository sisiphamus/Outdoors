name = "outdoors-chat"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ANTHROPIC_API_KEY is set via: wrangler secret put ANTHROPIC_API_KEY
# JWT_SECRET is set via: wrangler secret put JWT_SECRET

[[kv_namespaces]]
binding = "QUOTA_KV"
# id is filled in after: wrangler kv namespace create outdoors-chat-quota
id = ""
