name: Build & Test Windows

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Write OAuth credentials
        run: echo '${{ secrets.OAUTH_CREDS_JSON }}' > outdoorsv1/backend/oauth-creds.json

      # ── Tests (before build — fast feedback) ─────────────────────

      - name: Install backend dependencies
        working-directory: outdoorsv1/backend
        run: npm install

      - name: Run unit tests
        working-directory: outdoorsv1/backend
        run: node --test tests/clarification-manager.test.js tests/message-handler.test.js tests/runtime-health.test.js

      - name: Run platform tests
        working-directory: outdoorsv1/backend
        run: node --test tests/platform.test.js

      # ── Build ────────────────────────────────────────────────────

      - name: Install Electron dependencies
        working-directory: outdoorsv1/backend/electron
        run: npm install

      - name: Remove secrets before packaging
        run: rm -f outdoorsv1/backend/oauth-creds.json

      - name: Build and publish Windows installer
        working-directory: outdoorsv1/backend/electron
        run: npm run build:win -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify no secrets in build output
        working-directory: outdoorsv1/backend/electron
        shell: bash
        run: |
          set -e
          APP_DIR=$(find dist -name "win-unpacked" -maxdepth 2 | head -1)
          if [ -n "$APP_DIR" ]; then
            if [ -f "$APP_DIR/resources/project/config.json" ]; then echo "FAIL: config.json leaked"; exit 1; fi
            if [ -f "$APP_DIR/resources/project/.env" ]; then echo "FAIL: .env leaked"; exit 1; fi
            if [ -f "$APP_DIR/resources/project/oauth-creds.json" ]; then echo "FAIL: oauth-creds.json leaked"; exit 1; fi
            if [ -d "$APP_DIR/resources/project/auth_state" ]; then echo "FAIL: auth_state leaked"; exit 1; fi
            echo "All Windows bundle security checks passed"
          else
            echo "win-unpacked not found (NSIS only) — skipping"
          fi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Outdoors-Windows
          path: |
            outdoorsv1/backend/electron/dist/*.exe
          retention-days: 30
