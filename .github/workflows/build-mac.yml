name: Build & Test macOS

on:
  push:
    branches: [main]

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Write OAuth credentials
        run: echo '${{ secrets.OAUTH_CREDS_JSON }}' > outdoorsv1/backend/oauth-creds.json

      # ── Tests (before build — fast feedback) ─────────────────────

      - name: Install backend dependencies
        working-directory: outdoorsv1/backend
        run: npm install

      - name: Run unit tests
        working-directory: outdoorsv1/backend
        run: node --test tests/clarification-manager.test.js tests/message-handler.test.js tests/runtime-health.test.js

      - name: Run platform tests
        working-directory: outdoorsv1/backend
        run: node --test tests/platform.test.js

      - name: Run Mac integration tests
        working-directory: outdoorsv1/backend
        run: node --test tests/mac-integration.test.js

      - name: Run smoke test
        working-directory: outdoorsv1/backend
        run: node tests/e2e-check.js
        timeout-minutes: 2

      # ── Build ────────────────────────────────────────────────────

      - name: Install Electron dependencies
        working-directory: outdoorsv1/backend/electron
        run: npm install

      - name: Copy install instructions to dist
        run: mkdir -p outdoorsv1/backend/electron/dist && cp outdoorsv1/backend/electron/INSTALL-MAC.txt outdoorsv1/backend/electron/dist/

      - name: Build macOS installer
        working-directory: outdoorsv1/backend/electron
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # ── Post-build: verify build output ──────────────────────────

      - name: Verify DMG and app bundle
        working-directory: outdoorsv1/backend/electron
        run: |
          set -e

          # Verify .dmg was produced
          DMG_FILE=$(ls dist/*.dmg 2>/dev/null | head -1)
          if [ -z "$DMG_FILE" ]; then
            echo "FAIL: No .dmg file found in dist/"
            ls -la dist/
            exit 1
          fi
          echo "DMG: $DMG_FILE ($(du -h "$DMG_FILE" | cut -f1))"

          # Verify the unpacked .app in the build directory
          APP_DIR=$(find dist -name "Outdoors.app" -maxdepth 3 | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "FAIL: Outdoors.app not found in build output"
            exit 1
          fi
          echo "App: $APP_DIR"

          RESOURCES="$APP_DIR/Contents/Resources"

          # Verify Electron app code
          if test -f "$RESOURCES/app.asar"; then
            echo "PASS: app.asar exists"
          elif test -f "$RESOURCES/app/main.js"; then
            echo "PASS: app/main.js exists (unpacked)"
          else
            echo "FAIL: No app code found"; exit 1
          fi

          # Verify bundled backend project
          test -f "$RESOURCES/project/src/index.js" || { echo "FAIL: project/src/index.js missing"; exit 1; }
          test -f "$RESOURCES/project/package.json" || { echo "FAIL: project/package.json missing"; exit 1; }

          # Verify setup wizard
          test -f "$RESOURCES/project/src/setup/index.html" || { echo "FAIL: setup wizard HTML missing"; exit 1; }
          test -f "$RESOURCES/project/src/setup/renderer.js" || { echo "FAIL: setup renderer missing"; exit 1; }

          # Verify outdoorsv4 pipeline
          test -f "$RESOURCES/outdoorsv4/index.js" || { echo "FAIL: outdoorsv4/index.js missing"; exit 1; }

          # Verify no secrets in bundle
          if test -f "$RESOURCES/project/config.json"; then echo "FAIL: config.json leaked"; exit 1; fi
          if test -f "$RESOURCES/project/.env"; then echo "FAIL: .env leaked"; exit 1; fi

          echo ""
          echo "All build verification checks passed"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Outdoors-macOS
          path: |
            outdoorsv1/backend/electron/dist/*.dmg
            outdoorsv1/backend/electron/dist/*.zip
            outdoorsv1/backend/electron/dist/INSTALL-MAC.txt
          retention-days: 30
