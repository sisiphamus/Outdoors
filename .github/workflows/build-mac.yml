name: Build macOS Installer

on:
  push:
    branches: [main]

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Write OAuth credentials
        run: echo '${{ secrets.OAUTH_CREDS_JSON }}' > outdoorsv1/backend/oauth-creds.json

      - name: Install dependencies
        working-directory: outdoorsv1/backend/electron
        run: npm install

      - name: Build macOS installer
        working-directory: outdoorsv1/backend/electron
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Outdoors-macOS
          path: |
            outdoorsv1/backend/electron/dist/*.dmg
            outdoorsv1/backend/electron/dist/*.zip
          retention-days: 30
