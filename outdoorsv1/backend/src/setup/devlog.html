<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outdoors — Dev Log</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: ui-monospace, 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Filter Bar ── */
  #filter-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 2px 8px;
    border: 1px solid #0f3460;
    border-radius: 4px;
    background: transparent;
    color: #a0a0a0;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active {
    background: #0f3460;
    color: #fff;
    border-color: #1a73e8;
  }
  .filter-btn:hover { border-color: #1a73e8; }
  #search-input {
    margin-left: auto;
    padding: 3px 8px;
    border: 1px solid #0f3460;
    border-radius: 4px;
    background: #0d1b36;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 11px;
    width: 180px;
    outline: none;
  }
  #search-input:focus { border-color: #1a73e8; }
  #clear-btn {
    padding: 2px 8px;
    border: 1px solid #4a2020;
    border-radius: 4px;
    background: transparent;
    color: #e05050;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
  }
  #clear-btn:hover { background: #4a2020; color: #fff; }

  /* ── Conversation Tabs ── */
  #conv-tabs {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 12px;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .conv-tab {
    padding: 2px 10px;
    border: 1px solid #0f3460;
    border-radius: 4px;
    background: transparent;
    color: #a0a0a0;
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .conv-tab.active {
    background: #0f3460;
    color: #fff;
    border-color: #1a73e8;
  }
  .conv-tab:hover { border-color: #1a73e8; }
  .conv-tab .tab-count {
    margin-left: 4px;
    font-size: 9px;
    opacity: 0.6;
  }

  /* ── Status Bar ── */
  #status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 12px;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
    font-size: 11px;
    color: #888;
  }
  #status-bar .dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block;
  }
  .dot.connected { background: #4caf50; }
  .dot.disconnected { background: #e05050; }
  .dot.connecting { background: #ff9800; }

  /* ── Log Container ── */
  #log-container {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    scroll-behavior: auto;
  }
  #log-container::-webkit-scrollbar { width: 8px; }
  #log-container::-webkit-scrollbar-track { background: #1a1a2e; }
  #log-container::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 4px; }

  /* ── Log Entries ── */
  .entry {
    padding: 2px 0;
    border-bottom: 1px solid #1e1e3a;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .entry.hidden { display: none; }
  .entry .ts { color: #666; flex-shrink: 0; min-width: 85px; }
  .entry .badge {
    padding: 0 5px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    flex-shrink: 0;
    min-width: 70px;
    text-align: center;
  }
  .entry .msg { flex: 1; word-break: break-word; }

  /* Badge colors by type */
  .badge-stdout { background: #333; color: #aaa; }
  .badge-stderr { background: #5c1a1a; color: #ff8080; }
  .badge-tool_use { background: #4a3800; color: #ffd54f; }
  .badge-tool_result { background: #1b3a1b; color: #81c784; }
  .badge-assistant_text { background: #2a2a4a; color: #ccc; }
  .badge-cost { background: #3a1a4a; color: #ce93d8; }
  .badge-pipeline_phase { background: #0a3a3a; color: #4dd0e1; }
  .badge-log { background: #1a2a3a; color: #90caf9; }
  .badge-process { background: #1a1a4a; color: #9fa8da; }
  .badge-error { background: #5c1a1a; color: #ff5252; }
  .badge-received { background: #1a3a1a; color: #66bb6a; }

  /* Collapsible details */
  .entry details { margin-top: 2px; }
  .entry details summary {
    cursor: pointer;
    color: #666;
    font-size: 11px;
  }
  .entry details summary:hover { color: #aaa; }
  .entry pre {
    margin: 4px 0;
    padding: 6px;
    background: #0d1b36;
    border-radius: 4px;
    font-size: 11px;
    white-space: pre-wrap;
    max-height: 300px;
    overflow-y: auto;
    color: #b0b0b0;
  }

  /* ── Jump to Bottom ── */
  #jump-btn {
    position: fixed;
    bottom: 16px;
    right: 24px;
    padding: 6px 14px;
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    display: none;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  #jump-btn:hover { background: #1565c0; }
</style>
</head>
<body>

<div id="filter-bar">
  <button class="filter-btn active" data-filter="stdout">stdout</button>
  <button class="filter-btn active" data-filter="stderr">stderr</button>
  <button class="filter-btn active" data-filter="tool_use">tool_use</button>
  <button class="filter-btn active" data-filter="tool_result">tool_result</button>
  <button class="filter-btn active" data-filter="pipeline_phase">pipeline</button>
  <button class="filter-btn active" data-filter="cost">cost</button>
  <button class="filter-btn active" data-filter="log">log</button>
  <button class="filter-btn active" data-filter="process">process</button>
  <input type="text" id="search-input" placeholder="Search...">
  <button id="clear-btn">Clear</button>
</div>

<div id="conv-tabs">
  <button class="conv-tab active" data-conv="all">All</button>
</div>

<div id="status-bar">
  <span class="dot disconnected" id="socket-dot"></span>
  <span id="socket-status">Connecting...</span>
  <span style="margin-left:auto" id="entry-count">0 entries</span>
</div>

<div id="log-container"></div>
<button id="jump-btn">Jump to bottom</button>

<script>
const MAX_ENTRIES = 2000;
const container = document.getElementById('log-container');
const jumpBtn = document.getElementById('jump-btn');
const searchInput = document.getElementById('search-input');
const socketDot = document.getElementById('socket-dot');
const socketStatus = document.getElementById('socket-status');
const entryCountEl = document.getElementById('entry-count');

let entryCount = 0;
let autoScroll = true;
const activeFilters = new Set(['stdout','stderr','tool_use','tool_result','pipeline_phase','cost','log','process']);
const seenConversations = new Set();
let activeConv = 'all';
const convCounts = {};

// ── Filter buttons ──
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filter;
    btn.classList.toggle('active');
    if (activeFilters.has(f)) activeFilters.delete(f);
    else activeFilters.add(f);
    applyFilters();
  });
});

document.getElementById('clear-btn').addEventListener('click', () => {
  container.innerHTML = '';
  entryCount = 0;
  entryCountEl.textContent = '0 entries';
  // Reset conversation counts
  for (const k in convCounts) convCounts[k] = 0;
  document.querySelectorAll('.conv-tab .tab-count').forEach(el => el.textContent = '(0)');
});

// ── Conversation tabs ──
function getConvLabel(processKey) {
  if (!processKey) return null;
  const numbered = processKey.match(/^wa:conv:(\d+)$/);
  if (numbered) return '#' + numbered[1];
  if (processKey.startsWith('web:conv:')) return 'Web ' + processKey.split(':')[2];
  if (processKey.includes(':chat:')) return 'Chat';
  return processKey;
}

function ensureConvTab(processKey) {
  if (!processKey || seenConversations.has(processKey)) return;
  seenConversations.add(processKey);
  convCounts[processKey] = 0;
  const tabBar = document.getElementById('conv-tabs');
  const btn = document.createElement('button');
  btn.className = 'conv-tab';
  btn.dataset.conv = processKey;
  btn.innerHTML = escapeHtml(getConvLabel(processKey)) + '<span class="tab-count">(0)</span>';
  btn.addEventListener('click', () => {
    document.querySelectorAll('.conv-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    activeConv = processKey;
    applyFilters();
  });
  tabBar.appendChild(btn);
}

document.querySelector('.conv-tab[data-conv="all"]').addEventListener('click', function() {
  document.querySelectorAll('.conv-tab').forEach(t => t.classList.remove('active'));
  this.classList.add('active');
  activeConv = 'all';
  applyFilters();
});

searchInput.addEventListener('input', () => applyFilters());

function applyFilters() {
  const search = searchInput.value.toLowerCase();
  container.querySelectorAll('.entry').forEach(el => {
    const type = el.dataset.type;
    const conv = el.dataset.conv || '';
    const matchesFilter = activeFilters.has(type);
    const matchesSearch = !search || el.textContent.toLowerCase().includes(search);
    const matchesConv = activeConv === 'all' || conv === activeConv;
    el.classList.toggle('hidden', !(matchesFilter && matchesSearch && matchesConv));
  });
}

// ── Auto-scroll ──
container.addEventListener('scroll', () => {
  const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 40;
  autoScroll = atBottom;
  jumpBtn.style.display = atBottom ? 'none' : 'block';
});

jumpBtn.addEventListener('click', () => {
  container.scrollTop = container.scrollHeight;
  autoScroll = true;
  jumpBtn.style.display = 'none';
});

// ── Add entry ──
function addEntry(type, summary, details, processKey) {
  const now = new Date();
  const ts = now.toTimeString().slice(0,8) + '.' + String(now.getMilliseconds()).padStart(3,'0');

  // Map to filter category
  const category = getCategoryForType(type);
  const badgeClass = 'badge-' + (type === 'error' || type === 'handler_crash' || type === 'send_error' ? 'error' : type === 'received' ? 'received' : category);

  // Register conversation tab if needed
  if (processKey) ensureConvTab(processKey);

  const el = document.createElement('div');
  el.className = 'entry';
  el.dataset.type = category;
  if (processKey) el.dataset.conv = processKey;

  let detailsHtml = '';
  if (details) {
    const formatted = typeof details === 'string' ? details : JSON.stringify(details, null, 2);
    if (formatted.length > 80) {
      detailsHtml = `<details><summary>details</summary><pre>${escapeHtml(formatted)}</pre></details>`;
    } else {
      detailsHtml = `<span style="color:#666"> ${escapeHtml(formatted)}</span>`;
    }
  }

  el.innerHTML = `<span class="ts">${ts}</span><span class="badge ${badgeClass}">${escapeHtml(type)}</span><span class="msg">${escapeHtml(summary)}${detailsHtml}</span>`;

  // Update conversation count
  if (processKey) {
    convCounts[processKey] = (convCounts[processKey] || 0) + 1;
    const tabBtn = document.querySelector(`.conv-tab[data-conv="${CSS.escape(processKey)}"] .tab-count`);
    if (tabBtn) tabBtn.textContent = '(' + convCounts[processKey] + ')';
  }

  // Check filter visibility
  const search = searchInput.value.toLowerCase();
  const matchesFilter = activeFilters.has(category);
  const matchesSearch = !search || (summary + (typeof details === 'string' ? details : JSON.stringify(details || ''))).toLowerCase().includes(search);
  const matchesConv = activeConv === 'all' || (processKey && processKey === activeConv);
  if (!(matchesFilter && matchesSearch && matchesConv)) el.classList.add('hidden');

  container.appendChild(el);
  entryCount++;
  entryCountEl.textContent = entryCount + ' entries';

  // Cap entries
  while (container.children.length > MAX_ENTRIES) {
    container.removeChild(container.firstChild);
  }

  if (autoScroll) container.scrollTop = container.scrollHeight;
}

function getCategoryForType(type) {
  if (type === 'stdout') return 'stdout';
  if (type === 'stderr') return 'stderr';
  if (type === 'tool_use') return 'tool_use';
  if (type === 'tool_result') return 'tool_result';
  if (type === 'pipeline_phase') return 'pipeline_phase';
  if (type === 'cost') return 'cost';
  if (type === 'process_activity' || type === 'process_status') return 'process';
  if (type === 'received') return 'log';
  if (type === 'assistant_text') return 'log';
  return 'log';
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── IPC: stdout/stderr from backend process ──
if (window.devlogAPI) {
  window.devlogAPI.onStdout(text => {
    text.trim().split('\n').forEach(line => {
      if (line.trim()) addEntry('stdout', line.trim());
    });
  });
  window.devlogAPI.onStderr(text => {
    text.trim().split('\n').forEach(line => {
      if (line.trim()) addEntry('stderr', line.trim());
    });
  });
}

// ── Socket.IO: structured events from backend ──
async function connectSocket() {
  const url = window.devlogAPI
    ? await window.devlogAPI.getBackendUrl()
    : 'http://localhost:3457';

  socketDot.className = 'dot connecting';
  socketStatus.textContent = 'Loading Socket.IO...';

  // Load Socket.IO client from backend
  const script = document.createElement('script');
  script.src = url + '/socket.io/socket.io.js';
  script.onload = () => {
    socketStatus.textContent = 'Connecting...';
    const socket = io(url, { transports: ['websocket', 'polling'] });

    socket.on('connect', () => {
      socketDot.className = 'dot connected';
      socketStatus.textContent = 'Connected';
      addEntry('log', 'Socket.IO connected to ' + url);
    });

    socket.on('disconnect', (reason) => {
      socketDot.className = 'dot disconnected';
      socketStatus.textContent = 'Disconnected: ' + reason;
      addEntry('log', 'Socket.IO disconnected: ' + reason);
    });

    // Replay buffered history on connect (events that happened before devlog was opened)
    socket.on('log_history', (history) => {
      for (const entry of history) {
        const type = entry.type || 'log';
        if (type === 'process_activity') {
          const d = entry.data || {};
          const summary = `[${d.processKey || '?'}] ${d.type || '?'}: ${d.summary || ''}`;
          addEntry('process_activity', summary, null, d.processKey);
        } else {
          const pk = entry.data?.processKey || null;
          const summary = pk ? formatProgressSummary(type, entry.data, pk) : formatLogSummary(type, entry.data);
          addEntry(type, summary, entry.data, pk);
        }
      }
    });

    // Infrastructure log events (broadcast)
    socket.on('log', (entry) => {
      const type = entry.type || 'log';
      const pk = entry.data?.processKey || null;
      const summary = pk ? formatProgressSummary(type, entry.data, pk) : formatLogSummary(type, entry.data);
      addEntry(type, summary, entry.data, pk);
    });

    // Process activity (broadcast)
    socket.on('process_activity', (entry) => {
      const summary = `[${entry.processKey}] ${entry.type}: ${entry.summary || ''}`;
      addEntry('process_activity', summary, null, entry.processKey);
    });

    socket.on('process_status', (data) => {
      addEntry('process_status', 'Active processes: ' + JSON.stringify(data));
    });
  };
  script.onerror = () => {
    socketDot.className = 'dot disconnected';
    socketStatus.textContent = 'Failed to load Socket.IO — retrying in 3s';
    setTimeout(connectSocket, 3000);
  };
  document.head.appendChild(script);
}

function formatLogSummary(type, data) {
  if (!data) return type;
  if (type === 'tool_use') return `${data.tool || '?'}(${truncate(JSON.stringify(data.input || ''), 100)})`;
  if (type === 'tool_result') return `${data.tool || '?'} → ${truncate(String(data.output || ''), 120)}`;
  if (type === 'cost') return `$${data.cost || '?'} | ${data.duration || '?'}ms | in:${data.input_tokens||'?'} out:${data.output_tokens||'?'}`;
  if (type === 'pipeline_phase') return `Phase ${data.phase || '?'}: ${data.description || ''}`;
  if (type === 'assistant_text') return truncate(data.text || '', 150);
  if (data.message) return data.message;
  if (data.error) return data.error;
  const keys = Object.keys(data);
  if (keys.length <= 3) return keys.map(k => `${k}=${typeof data[k] === 'string' ? data[k] : JSON.stringify(data[k])}`).join(' ');
  return type;
}

function formatProgressSummary(type, data, processKey) {
  const prefix = processKey ? `[${processKey}] ` : '';
  return prefix + formatLogSummary(type, data);
}

function truncate(str, max) {
  return str.length > max ? str.slice(0, max) + '...' : str;
}

connectSocket();
</script>
</body>
</html>
