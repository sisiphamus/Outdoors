appId: com.outdoors.desktop
productName: Outdoors
copyright: Copyright © 2026 Outdoors
afterPack: ./sign-adhoc.js

directories:
  output: dist

files:
  - main.js
  - preload.js
  - platform.js
  - "!dist"
  - "!node_modules/.cache"

extraResources:
  - from: ../../../outdoorsv4
    to: outdoorsv4
    filter:
      - "**/*"
  - from: ../
    to: project
    filter:
      - "**/*"
      # Dependencies & build artifacts
      - "!node_modules/**"
      - "!electron/**"
      # Auth & config
      - "!auth_state/**"
      - "!config.json"
      - "!.env"
      # Conversation data
      - "!bot/logs/**"
      - "!bot/outputs/**"
      # User data (generated per-machine)
      - "!bot/memory/preferences/**"
      - "!bot/memory/sites/**"
      - "!bot/memory/short-term/**"
      - "!bot/memory/chat-sessions.json"
      - "!bot/memory/wa-chat-sessions.json"
      - "!bot/memory/conversations.json"
      - "!bot/memory/knowledge/mcmurtry.md"
      - "!bot/memory/knowledge/rice-edu.md"
      - "!bot/memory/knowledge/personal-assistant-projects.md"
      # Tests & runtime artifacts
      - "!tests/**"
      - "!bot/message-queue/**"
      - "!package-lock.json"

mac:
  target:
    - pkg
  icon: ../src/setup/icon.png
  category: public.app-category.utilities

pkg:
  installLocation: /Applications
  allowCurrentUserHome: false
  allowRootDirectory: false
  scripts: pkg-scripts

win:
  target:
    - target: nsis
      arch: [x64]
  icon: ../src/setup/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: ../src/setup/icon.ico
  uninstallerIcon: ../src/setup/icon.ico
  installerHeaderIcon: ../src/setup/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Outdoors
  include: installer.nsh
